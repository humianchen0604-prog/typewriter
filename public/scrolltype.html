<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll into something new · TikTok</title>
  <style>
    /* ── Fonts ──────────────────────────────────────────────── */
    @font-face {
      font-family: 'TikTok Sans';
      src: url('/fonts/TikTokSans16pt-Regular.woff2') format('woff2'),
           url('/fonts/TikTokSans16pt-Regular.ttf') format('truetype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TikTok Sans';
      src: url('/fonts/TikTokSans16pt-SemiBold.woff2') format('woff2'),
           url('/fonts/TikTokSans16pt-SemiBold.ttf') format('truetype');
      font-weight: 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TikTok Sans';
      src: url('/fonts/TikTokSans16pt-Bold.woff2') format('woff2'),
           url('/fonts/TikTokSans16pt-Bold.ttf') format('truetype');
      font-weight: 700; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TikTok Sans';
      src: url('/fonts/TikTokSans36pt-ExtraBold.woff2') format('woff2'),
           url('/fonts/TikTokSans36pt-ExtraBold.ttf') format('truetype');
      font-weight: 800; font-style: normal; font-display: swap;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'TikTok Sans', system-ui, sans-serif;
      background: #F2F2F2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* ── Phone frame ─────────────────────────────────────────── */
    .frame {
      width: 390px;
      height: 844px;
      background: #fff;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14);
    }

    /* ── Status bar ──────────────────────────────────────────── */
    .status-bar {
      height: 47px;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }
    .status-time {
      position: absolute;
      left: 64px;
      top: 50%;
      transform: translateX(-50%) translateY(-50%);
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
      color: black;
      white-space: nowrap;
    }
    .status-bar img {
      position: absolute;
      display: block;
    }
    .status-signal    { width: 21.3px; height: 12.8px; right: 84.7px;  top: 50%; transform: translateY(calc(-50% + 2.1px)); }
    .status-wifi      { width: 17.68px; height: 13px;  right: 60.32px; top: 50%; transform: translateY(calc(-50% + 2px)); }
    .status-battery   { width: 29.4px; height: 14px;   right: 25.57px; top: 50%; transform: translateY(calc(-50% + 2.5px)); }

    /* ── Navigation bar ──────────────────────────────────────── */
    .nav-bar {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 6px;
    }
    .nav-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn img { width: 24px; height: 24px; display: block; }

    /* ── Main section ────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 60px 32px 0;
      min-height: 0;
    }

    /* Upper: logo + heading */
    .upper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }
    .tiktok-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }
    .heading {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.2;
      color: black;
      text-align: center;
      width: 100%;
    }

    /* Action block */
    .action {
      display: flex;
      flex-direction: column;
      gap: 48px;
      width: 100%;
    }

    /* Input group */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-field {
      height: 56px;
      background: #f8f8f8;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 17px;
      font-weight: 400;
      color: rgba(0,0,0,0.34);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-primary {
      height: 56px;
      background: black;
      border: none;
      border-radius: 999px;
      color: white;
      font-family: 'TikTok Sans', system-ui, sans-serif;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    /* Social buttons */
    .social-row {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }
    .social-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.12);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .social-btn svg { width: 26px; height: 26px; display: block; }

    /* ── Disclaimer ──────────────────────────────────────────── */
    .disclaimer {
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .disclaimer p {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.3;
      color: rgba(0,0,0,0.48);
      text-align: center;
      width: 342px;
    }
    .disclaimer a {
      color: #2B5DB9;
      text-decoration: none;
    }

    /* ── Home indicator ──────────────────────────────────────── */
    .home-indicator {
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 9px;
    }
    .home-bar {
      width: 134px;
      height: 5px;
      background: black;
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="frame">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">8:00</span>
      <img class="status-signal"  src="/assets/signal.png"     alt="" />
      <img class="status-wifi"    src="/assets/connection.png" alt="" />
      <img class="status-battery" src="/assets/battery.png"    alt="" />
    </div>

    <!-- Navigation bar -->
    <div class="nav-bar">
      <div class="nav-btn">
        <img src="/assets/nav-help.png" alt="Help" />
      </div>
    </div>

    <!-- Main content -->
    <div class="main">

      <!-- Logo + heading -->
      <div class="upper">
        <img class="tiktok-logo" src="/assets/tiktok-logo.png" alt="TikTok" />
        <h1 class="heading">Scroll into something new</h1>
      </div>

      <!-- Input, button, social -->
      <div class="action">
        <div class="input-group">
          <div class="input-field">Phone number, email or username</div>
          <button class="btn-primary">Get started</button>
        </div>

        <div class="social-row">
          <!-- Apple -->
          <button class="social-btn" aria-label="Continue with Apple">
            <svg viewBox="0 0 24 24" fill="none">
              <path fill="#000" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
          </button>

          <!-- Google -->
          <button class="social-btn" aria-label="Continue with Google">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </button>

          <!-- Facebook -->
          <button class="social-btn" aria-label="Continue with Facebook">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="12" fill="#1877F2"/>
              <path d="M16.67 15.47l.52-3.47h-3.33v-2.25c0-.95.46-1.87 1.96-1.87h1.51V4.99s-1.37-.23-2.69-.23c-2.74 0-4.53 1.66-4.53 4.67v2.57H7.08v3.47h3.03v8.39a12.1 12.1 0 0 0 3.75 0v-8.39h2.81z" fill="#fff"/>
            </svg>
          </button>

          <!-- More -->
          <button class="social-btn" aria-label="More options">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="5"  cy="12" r="2" fill="#000"/>
              <circle cx="12" cy="12" r="2" fill="#000"/>
              <circle cx="19" cy="12" r="2" fill="#000"/>
            </svg>
          </button>
        </div>
      </div>

    </div><!-- /main -->

    <!-- Disclaimer -->
    <div class="disclaimer">
      <p>
        By signing up, you agree to our
        <a href="#">Terms of Service</a>
        and acknowledge that you have read our
        <a href="#">Privacy Policy</a>.
      </p>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator">
      <div class="home-bar"></div>
    </div>

  </div><!-- /frame -->
</body>
</html>
